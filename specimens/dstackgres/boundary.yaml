# Boundary derived from the real deployment (README architecture + compose.yml).
# Honest about the controlled egress: a managed Postgres ships WAL to encrypted
# backups and follows on-chain control, so it is NOT deny-all. Gate 1 will (correctly)
# flag the category/egress mismatch and the unpinned hosts — real boundary questions a
# reviewer must judge before this could earn `guarded`.
sealedVolumes:
  - /var/lib/postgresql/data        # pgdata — encrypted disk, AES-256-GCM, KMS-derived key
  - /teesql-shared                  # cross-service status/handoff
  - /var/lib/teesql-fabric          # wg fabric state
  - /data                           # wireguard keypair
raTlsSurfaces:
  - 5433
egress:
  monitor: warden@1
  policy: allowlist
  allowlist:
    - { host: chain-indexer.teesql.com }   # control-plane SSE (on-chain instruction stream)
    # deploy-time, host varies by env: Base RPC (TEESQL_BASE_RPC_URL) and the
    # S3 backup endpoint (TEESQL_S3_*). Declared here so the Warden mediates them.
secrets:
  replication: born-in-box          # KMS-derived replication password; never a plaintext env var
logRedaction:
  postgres: log_statement=none
