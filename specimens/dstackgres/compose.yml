# Generated by teesql cluster deploy
# Role-agnostic cluster compose; runtime values flow through encrypted env.
#
# WireGuard fabric compose for the current cluster shape.

services:
  fabric:
    image: ghcr.io/teesql/teesql-fabric:v0.1.0
    hostname: ${TS_HOSTNAME}
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
    ports:
      - "5433:5433"
      - "8080:8080"
      - "51820:51820/tcp"
    volumes:
      - /var/run/dstack.sock:/var/run/dstack.sock
      - teesql-shared:/teesql-shared
      - fabric-data:/var/lib/teesql-fabric
      - wireguard-keypair-data:/data
    environment:
      - TEESQL_FABRIC_LISTEN_PORT=51820
      - TEESQL_FABRIC_WG_INTERFACE=wg0
      - TEESQL_FABRIC_MTU=1376
      - TEESQL_FABRIC_HEALTH_PORT=8085
      - TEESQL_CONTROL_SIDECAR_LOOPBACK=http://127.0.0.1:8084
      - TEESQL_CHAIN_INDEXER_SSE_URL=https://chain-indexer.teesql.com/v1/base/clusters/${TEESQL_CLUSTER_APP_ADDRESS}/events/sse
      - TEESQL_CLUSTER_APP_ADDRESS=${TEESQL_CLUSTER_APP_ADDRESS}
      - TEESQL_CLUSTER_FROM_BLOCK=${TEESQL_CLUSTER_FROM_BLOCK}
      - TEESQL_BASE_RPC_URL=${TEESQL_BASE_RPC_URL}
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8085/health"]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    ulimits:
      core: 0

  postgres:
    # teesql-postgres = postgres:17 + bootstrap entrypoint + init script baked
    # in. Phala's compose handler doesn't honor `entrypoint:` overrides on
    # bind-mounted scripts, so we ship the wrappers in the image instead.
    image: ghcr.io/teesql/teesql-postgres:v1.2.0
    environment:
      POSTGRES_HOST_AUTH_METHOD: trust
      TEESQL_ROLE: ${TEESQL_ROLE}
      TEESQL_PRIMARY_HOST: ${TEESQL_PRIMARY_HOST}
      TEESQL_REPLICATION_PASSWORD: ${TEESQL_REPLICATION_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - teesql-shared:/teesql-shared
    depends_on:
      fabric:
        condition: service_healthy
    network_mode: "service:fabric"
    restart: unless-stopped
    ulimits:
      core: 0

  sidecar:
    image: ghcr.io/teesql/teesql-data-sidecar:v0.23.0
    volumes:
      - /var/run/dstack.sock:/var/run/dstack.sock
      - teesql-shared:/teesql-shared
    environment:
      # postgres + sidecar share fabric's netns, so the sidecar reaches
      # postgres on loopback inside the wg0 namespace.
      - PGHOST=127.0.0.1
      - PGPORT=5432
      - TEESQL_ROLE=${TEESQL_ROLE}
      - TEESQL_PRIMARY_HOST=${TEESQL_PRIMARY_HOST}
      - TEESQL_S3_BUCKET=${TEESQL_S3_BUCKET}
      - TEESQL_S3_REGION=${TEESQL_S3_REGION}
      - TEESQL_S3_ACCESS_KEY=${TEESQL_S3_ACCESS_KEY}
      - TEESQL_S3_SECRET_KEY=${TEESQL_S3_SECRET_KEY}
      - TEESQL_BACKUP_INTERVAL_HOURS=${TEESQL_BACKUP_INTERVAL_HOURS}
      # Phase B bridge integration (optional - only set for bridge deployments)
      - TEESQL_TEE_BRIDGE_ADDRESS=${TEESQL_TEE_BRIDGE_ADDRESS}
      - TEESQL_DSTACK_VERIFIER_ADDRESS=${TEESQL_DSTACK_VERIFIER_ADDRESS}
      - TEESQL_CLUSTER_ID=${TEESQL_CLUSTER_ID}
      - TEESQL_BASE_RPC_URL=${TEESQL_BASE_RPC_URL}
    network_mode: "service:fabric"
    depends_on:
      - postgres
      - fabric
    restart: unless-stopped
    ulimits:
      core: 0

volumes:
  pgdata:
  teesql-shared:
  fabric-data:
  wireguard-keypair-data:
