# Deterministic build recipe — the image is pinned to an immutable digest (the
# arch-stable manifest-list digest), so two independent rebuilders resolve the
# same bytes and converge on the same compose-hash measurement.
services:
  postgres:
    image: postgres@sha256:ac5dfd145382caa043363d9ebd5823134f0c20017c87b11a1ffcd1fa64f52500
    command:
      - postgres
      - "-c"
      - "log_statement=none"
      - "-c"
      - "ssl=on"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - pgwal:/var/lib/postgresql/wal
    ports:
      - "5432:5432"
volumes:
  pgdata:
  pgwal:
