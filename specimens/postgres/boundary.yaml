# the machine-checkable boundary (the substance behind diet / predators / field note).
# Egress is enforced by the standardized monitor (the Warden); this declares the policy.
sealedVolumes:
  - /var/lib/postgresql/data
  - /var/lib/postgresql/wal
  - /tmp
raTlsSurfaces:
  - 5432
egress:
  monitor: warden@1                 # the standard egress monitor (measured)
  policy: deny-all                  # a datastore needs nothing outbound
  allowlist: []
secrets:
  superuser: born-in-box            # derived in-enclave; never an env var or arg
logRedaction:
  postgres: log_statement=none      # no query text crosses the wall
